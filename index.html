<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>OpenFront Lobbies</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header class="topbar">
      <div class="topbarInner">
        <a class="brandLogo" href="./" aria-label="OpenFront lobbies home">
          <img
            src="https://cdn.ofedge.io/game_assets/_assets/images/OpenFrontLogo.032dff0bb225.svg"
            alt="OpenFront"
          />
        </a>

        <div class="headerActions">
          <button id="toggleFilters" class="filtersToggle" type="button">Filters</button>
          <button id="alertToggle" class="alertToggle" type="button">Alerts: Off</button>
        </div>

        <div class="counts">
          <div class="status is-connecting" id="status">Connecting…</div>
          <div><span id="serverTime">—</span></div>
        </div>

        <div class="discordGroup">
          <a class="discord-btn" href="https://discord.com/users/622431947339202561" target="_blank" rel="noreferrer" aria-label="Kale on Discord">
            <img class="discord-icon" src="https://cdn.simpleicons.org/discord/white" alt="" />
            <span class="discord-name">Kale</span>
          </a>
          <a class="discord-btn" href="https://discord.com/users/422545450919526411" target="_blank" rel="noreferrer" aria-label="Wonder on Discord">
            <img class="discord-icon" src="https://cdn.simpleicons.org/discord/white" alt="" />
            <span class="discord-name">Wonder</span>
          </a>
        </div>
      </div>
    </header>
    
    <div class="wrap">
      <div class="panelShell" id="panelShell">
      <div class="panel">
        <div class="panelHead">
          <div class="panelTitle">Filters</div>
          <button id="reset" type="button" class="resetBtn">Reset all</button>
        </div>

        <div class="filterGroup">
          <div class="groupLabel">Lobby</div>
          <div class="row">
            <div>
              <label for="type">Type</label>
              <select id="type" hidden>
                <option value="all" selected>All</option>
                <option value="ffa">FFA</option>
                <option value="team">Teams</option>
                <option value="humansVsNations">Humans vs Nations</option>
              </select>
              <div class="csel" data-select="type"></div>
            </div>

            <div>
              <label for="teamsFilter">Teams</label>
              <select id="teamsFilter" hidden>
                <option value="any" selected>All</option>
                <option value="format:Duos">Duos (2 per team)</option>
                <option value="format:Trios">Trios (3 per team)</option>
                <option value="format:Quads">Quads (4 per team)</option>
                <option value="teams:2">2 teams</option>
                <option value="teams:3">3 teams</option>
                <option value="teams:4">4 teams</option>
                <option value="teams:5">5 teams</option>
                <option value="teams:6">6 teams</option>
                <option value="teams:7">7 teams</option>
                <option value="teams:8">8 teams</option>
              </select>
              <div class="csel" data-select="teamsFilter"></div>
            </div>

            <div>
              <label for="hideEmpty">Hide empty</label>
              <select id="hideEmpty" hidden>
                <option value="no" selected>No</option>
                <option value="yes">Yes</option>
              </select>
              <div class="csel" data-select="hideEmpty"></div>
            </div>

            <div>
              <label for="sort">Sort by</label>
              <select id="sort" hidden>
                <option value="players_desc">Players ↓</option>
                <option value="players_asc">Players ↑</option>
                <option value="maxPlayers_desc">Max Players ↓</option>
                <option value="maxPlayers_asc">Max Players ↑</option>
                <option value="starts_asc" selected>Starts Soonest</option>
                <option value="map_asc">Map A→Z</option>
              </select>
              <div class="csel" data-select="sort"></div>
            </div>

            <div>
              <label for="worker">Server</label>
              <select id="worker" hidden>
                <option value="w0" selected>w0</option>
                <option value="w1">w1</option>
                <option value="w2">w2</option>
                <option value="w3">w3</option>
              </select>
              <div class="csel" data-select="worker"></div>
            </div>
          </div>
        </div>

        <div class="filterGroup">
          <div class="groupLabel">Players</div>
          <div class="row">
            <div>
              <label for="minJoined">Min joined</label>
              <input id="minJoined" type="number" placeholder="any" />
            </div>
            <div>
              <label for="maxJoined">Max joined</label>
              <input id="maxJoined" type="number" placeholder="any" />
            </div>
            <div>
              <label for="maxPlayersEq">Capacity =</label>
              <input id="maxPlayersEq" type="number" placeholder="any" />
            </div>
            <div>
              <label for="minMaxPlayers">Min capacity</label>
              <input id="minMaxPlayers" type="number" placeholder="any" />
            </div>
            <div>
              <label for="maxMaxPlayers">Max capacity</label>
              <input id="maxMaxPlayers" type="number" placeholder="any" />
            </div>
            <div>
              <label for="minPerTeam">Min per team</label>
              <input id="minPerTeam" type="number" placeholder="any" />
            </div>
            <div>
              <label for="maxPerTeam">Max per team</label>
              <input id="maxPerTeam" type="number" placeholder="any" />
            </div>
          </div>
        </div>

        <div class="filterGroup">
          <div class="groupLabel">Profiles</div>
          <div class="profileRow">
            <div>
              <label for="profileName">Profile name</label>
              <input id="profileName" type="text" placeholder="e.g. Big team games" />
            </div>
            <div>
              <label for="profileSelect">Active profiles</label>
              <select id="profileSelect" hidden multiple></select>
              <div class="csel" data-select="profileSelect"></div>
            </div>
            <div>
              <label>&nbsp;</label>
              <button id="profileSave" type="button">Save</button>
            </div>
            <div>
              <label>&nbsp;</label>
              <button id="profileDelete" type="button">Delete</button>
            </div>
          </div>
        </div>

        <div class="filterGroup">
          <div class="groupLabel">Modifiers</div>
          <div class="modsRow" id="modFilters"></div>
        </div>
      </div>
      </div>

      <div id="cardView" class="cardView">
        <div id="cardGrid" class="cardGrid">
          <div class="cardEmpty mono">waiting for data…</div>
        </div>
      </div>

    </div>

    <script>
      document.body.classList.add("card-view");

      // App-like feel: block native dragging of images/links/text everywhere.
      document.addEventListener("dragstart", (e) => e.preventDefault());

      function getMapThumbnailUrl(mapName) {
        if (typeof mapName !== "string") mapName = "";
      
        const slug = mapName
          .toLowerCase()
          .replace(/[\s_]/g, "")
          .replace(/[^\w]/g, "");
      
        return `https://raw.githubusercontent.com/openfrontio/OpenFrontIO/main/resources/maps/${slug}/thumbnail.webp`;
      }
      
      const TRI = { ANY: "any", YES: "yes", NO: "no" };
      const $ = (id) => document.getElementById(id);
      
      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
      
      function buildCustomSelect(selectEl, host) {
        const isTeamsFilter = selectEl.id === "teamsFilter";
        const isProfileSelect = selectEl.id === "profileSelect";
        const isMulti = isTeamsFilter || isProfileSelect;

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "csel-trigger";
        btn.setAttribute("aria-expanded", "false");

        const list = document.createElement("div");
        list.className = "csel-list";
        list.setAttribute("role", "listbox");
        if (isMulti) list.setAttribute("aria-multiselectable", "true");

        function getSelectedOption() {
          return selectEl.options[selectEl.selectedIndex] || null;
        }

        function getTeamsFilterValues() {
          const values = Array.from(state.teamFilters || []);
          return values.includes("any") ? [] : values;
        }

        function getProfileValues() {
          return Array.from(state.activeProfiles || []);
        }

        function renderButton() {
          if (isTeamsFilter) {
            const selected = getTeamsFilterValues();
            if (selected.length === 0) {
              btn.textContent = "All";
              return;
            }

            if (selected.length <= 2) {
              btn.textContent = selected
                .map((v) => selectEl.querySelector(`option[value="${CSS.escape(v)}"]`)?.textContent || v)
                .join(", ");
              return;
            }

            btn.textContent = `${selected.length} selected`;
            return;
          }

          if (isProfileSelect) {
            const selected = getProfileValues();
            if (selected.length === 0) {
              btn.textContent = "Manual filters";
              return;
            }
            btn.textContent = selected.length <= 2 ? selected.join(", ") : `${selected.length} profiles`;
            return;
          }

          const opt = getSelectedOption();
          btn.textContent = opt ? opt.textContent : "(select)";
        }

        function close() {
          host.classList.remove("open");
          btn.setAttribute("aria-expanded", "false");
        }

        function open() {
          host.classList.add("open");
          btn.setAttribute("aria-expanded", "true");
        }

        function toggle() {
          host.classList.contains("open") ? close() : open();
        }

        function syncProfileNativeSelect() {
          if (!isProfileSelect) return;
          for (const option of selectEl.options) {
            option.selected = state.activeProfiles.has(option.value);
          }
        }

        function pick(value) {
          if (isTeamsFilter) {
            if (value === "any") {
              state.teamFilters = new Set(["any"]);
              selectEl.value = "any";
            } else {
              if (state.teamFilters.has(value)) state.teamFilters.delete(value);
              else state.teamFilters.add(value);

              state.teamFilters.delete("any");
              if (state.teamFilters.size === 0) state.teamFilters.add("any");
              selectEl.value = Array.from(state.teamFilters)[0] || "any";
            }

            renderButton();
            syncSelectedUI();
            selectEl.dispatchEvent(new Event("change", { bubbles: true }));
            return;
          }

          if (isProfileSelect) {
            if (value === "__manual__") {
              clearActiveProfiles();
            } else if (state.activeProfiles.has(value)) {
              state.activeProfiles.delete(value);
              state.profileSelectionOrder = state.profileSelectionOrder.filter((name) => name !== value);
              saveActiveProfileNames();

              const lastName = state.profileSelectionOrder.at(-1);
              const lastProfile = getStoredProfiles().find((p) => p?.name === lastName);
              if (lastProfile) {
                els.profileName.value = lastProfile.name;
                applyProfileSnapshot(lastProfile.filters);
              }
            } else {
              const profile = getStoredProfiles().find((p) => p?.name === value);
              if (!profile) return;

              state.activeProfiles.add(value);
              state.profileSelectionOrder = state.profileSelectionOrder.filter((name) => name !== value);
              state.profileSelectionOrder.push(value);
              saveActiveProfileNames();

              els.profileName.value = profile.name;
              applyProfileSnapshot(profile.filters);
            }

            syncProfileNativeSelect();
            renderButton();
            syncSelectedUI();
            resetAlertBaseline();
            scheduleRender();
            return;
          }

          selectEl.value = value;
          renderButton();
          syncSelectedUI();
          close();
          selectEl.dispatchEvent(new Event("change", { bubbles: true }));
        }

        function syncSelectedUI() {
          const selectedTeams = isTeamsFilter ? new Set(getTeamsFilterValues()) : null;
          const selectedProfiles = isProfileSelect ? new Set(getProfileValues()) : null;

          list.querySelectorAll(".csel-opt").forEach((optionButton) => {
            let selected;
            if (isTeamsFilter) {
              selected = optionButton.dataset.value === "any"
                ? selectedTeams.size === 0
                : selectedTeams.has(optionButton.dataset.value);
            } else if (isProfileSelect) {
              selected = optionButton.dataset.value === "__manual__"
                ? selectedProfiles.size === 0
                : selectedProfiles.has(optionButton.dataset.value);
            } else {
              selected = optionButton.dataset.value === selectEl.value;
            }

            optionButton.setAttribute("aria-selected", selected ? "true" : "false");
          });
        }

        function addOption(optionData) {
          if (!optionData) return;
          const optionButton = document.createElement("button");
          optionButton.type = "button";
          optionButton.className = "csel-opt";
          optionButton.textContent = optionData.text;
          optionButton.dataset.value = optionData.value;
          optionButton.setAttribute("role", "option");
          optionButton.setAttribute("aria-selected", "false");
          optionButton.addEventListener("click", () => pick(optionData.value));
          list.appendChild(optionButton);
        }

        function addSep() {
          const sep = document.createElement("div");
          sep.className = "csel-sep";
          list.appendChild(sep);
        }

        function addGroup(name) {
          const group = document.createElement("div");
          group.className = "csel-group";
          group.textContent = name;
          list.appendChild(group);
        }

        function addOptionByValue(value) {
          const option = Array.from(selectEl.options).find((o) => o.value === value);
          if (option) addOption({ value: option.value, text: option.textContent });
        }

        function buildList() {
          list.innerHTML = "";
          const isSort = selectEl.id === "sort";

          if (isProfileSelect) {
            addOption({ value: "__manual__", text: "Manual filters" });
            const options = Array.from(selectEl.options);
            if (options.length) {
              addSep();
              addGroup("Saved profiles");
              for (const option of options) addOption({ value: option.value, text: option.textContent });
            }
            syncSelectedUI();
            return;
          }

          if (isTeamsFilter) {
            const options = Array.from(selectEl.options).map((o) => ({ value: o.value, text: o.textContent }));
            const byValue = (value) => options.find((option) => option.value === value);

            addOption(byValue("any"));
            addSep();
            addGroup("Per-Team Formats");
            for (const value of ["format:Duos", "format:Trios", "format:Quads"]) addOption(byValue(value));
            addSep();
            addGroup("Teams (Exact Count)");
            for (const value of ["teams:2", "teams:3", "teams:4", "teams:5", "teams:6", "teams:7", "teams:8"]) addOption(byValue(value));
            syncSelectedUI();
            return;
          }

          if (isSort) {
            addGroup("Players");
            addOptionByValue("players_desc");
            addOptionByValue("players_asc");
            addSep();
            addGroup("Max Players");
            addOptionByValue("maxPlayers_desc");
            addOptionByValue("maxPlayers_asc");
            addSep();
            addGroup("Other");
            addOptionByValue("starts_asc");
            addOptionByValue("map_asc");
            syncSelectedUI();
            return;
          }

          for (const option of Array.from(selectEl.options)) {
            addOption({ value: option.value, text: option.textContent });
          }
          syncSelectedUI();
        }

        btn.addEventListener("click", toggle);
        btn.addEventListener("keydown", (event) => {
          if (event.key === "Escape") close();
        });

        host.appendChild(btn);
        host.appendChild(list);

        host._refreshCustomSelect = () => {
          syncProfileNativeSelect();
          buildList();
          renderButton();
          syncSelectedUI();
        };

        host._refreshCustomSelect();

        document.addEventListener("click", (event) => {
          if (!host.contains(event.target)) close();
        });

        selectEl.addEventListener("change", () => {
          renderButton();
          syncSelectedUI();
        });
      }

      function initCustomSelects() {
        document.querySelectorAll(".csel[data-select]").forEach((host) => {
          const id = host.getAttribute("data-select");
          const selectEl = document.getElementById(id);
          if (!selectEl) return;
          buildCustomSelect(selectEl, host);
        });
      }
      
      const els = {
        status: $("status"),
        worker: $("worker"),
        type: $("type"),
        teamsFilter: $("teamsFilter"),
        hideEmpty: $("hideEmpty"),
        reset: $("reset"),
        sort: $("sort"),
      
        minJoined: $("minJoined"),
        maxJoined: $("maxJoined"),
        maxPlayersEq: $("maxPlayersEq"),
        minMaxPlayers: $("minMaxPlayers"),
        maxMaxPlayers: $("maxMaxPlayers"),
        minPerTeam: $("minPerTeam"),
        maxPerTeam: $("maxPerTeam"),

        profileName: $("profileName"),
        profileSelect: $("profileSelect"),
        profileSave: $("profileSave"),
        profileDelete: $("profileDelete"),
      
        modFilters: $("modFilters"),
        serverTime: $("serverTime"),
        cardGrid: $("cardGrid"),
        alertToggle: $("alertToggle"),
        toggleFilters: $("toggleFilters"),
        panelShell: $("panelShell"),
      };
      
      const state = {
        ws: null,
        payload: null,
        tri: new Map(),
      
        teamFilters: new Set(["any"]),
        activeProfiles: new Set(),
        profileSelectionOrder: [],
        applyingProfile: false,
      
        alertsEnabled: localStorage.getItem("openfrontAlertsEnabled") === "true",
        alertPrevIds: new Set(),
        alertBaselineReady: false,
        alertLastFilterKey: "",
        flashIds: new Map(),
        titleBlinkTimer: null,
        titleBlinkStopTimer: null,
        originalTitle: document.title,
        audioCtx: null,
        renderScheduled: false,
        lastStructSig: "",
        pendingStructure: null,
        cardsHoverHold: false,
        filtersOpenTimer: null,

        reconnectTimer: null,
        staleTimer: null,
        lastMessageAt: 0,
        reconnectAttempts: 0,
        manualDisconnect: false,
      };
      


      const PROFILE_STORAGE_KEY = "openfrontFilterProfiles";
      const PROFILE_ACTIVE_STORAGE_KEY = "openfrontActiveProfiles";

      function getStoredProfiles() {
        try {
          const parsed = JSON.parse(localStorage.getItem(PROFILE_STORAGE_KEY) || "[]");
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function saveStoredProfiles(profiles) {
        localStorage.setItem(PROFILE_STORAGE_KEY, JSON.stringify(profiles));
      }

      function getSavedActiveProfileNames() {
        try {
          const parsed = JSON.parse(localStorage.getItem(PROFILE_ACTIVE_STORAGE_KEY) || "[]");
          return Array.isArray(parsed) ? parsed.filter((name) => typeof name === "string") : [];
        } catch {
          return [];
        }
      }

      function saveActiveProfileNames() {
        localStorage.setItem(PROFILE_ACTIVE_STORAGE_KEY, JSON.stringify(state.profileSelectionOrder));
      }

      function refreshProfileSelect(selectedNames = null) {
        const profiles = getStoredProfiles().filter((profile) => profile?.name)
          .sort((a, b) => String(a.name).localeCompare(String(b.name)));
        const validNames = new Set(profiles.map((profile) => profile.name));

        if (selectedNames !== null) {
          const names = Array.isArray(selectedNames) ? selectedNames : [selectedNames];
          state.activeProfiles = new Set(names.filter((name) => validNames.has(name)));
          state.profileSelectionOrder = names.filter((name) => state.activeProfiles.has(name));
        } else {
          state.activeProfiles = new Set(Array.from(state.activeProfiles).filter((name) => validNames.has(name)));
          state.profileSelectionOrder = state.profileSelectionOrder.filter((name) => state.activeProfiles.has(name));
        }

        els.profileSelect.innerHTML = "";
        for (const profile of profiles) {
          const option = document.createElement("option");
          option.value = profile.name;
          option.textContent = profile.name;
          option.selected = state.activeProfiles.has(profile.name);
          els.profileSelect.appendChild(option);
        }

        saveActiveProfileNames();
        document.querySelector('.csel[data-select="profileSelect"]')?._refreshCustomSelect?.();
      }

      function clearActiveProfiles() {
        state.activeProfiles.clear();
        state.profileSelectionOrder = [];
        saveActiveProfileNames();
        refreshProfileSelect([]);
        resetAlertBaseline();
        scheduleRender();
      }

      function leaveProfileModeOnManualChange() {
        if (state.applyingProfile || state.activeProfiles.size === 0) return;
        clearActiveProfiles();
      }

      function getProfileSnapshot() {
        const filters = getFiltersFromUI();
        return {
          worker: els.worker.value,
          type: filters.type,
          hideEmpty: filters.hideEmpty,
          teamFilters: filters.teamFilters,
          sort: filters.sort,
          minJoined: filters.minJoined,
          maxJoined: filters.maxJoined,
          maxPlayersEq: filters.maxPlayersEq,
          minMaxPlayers: filters.minMaxPlayers,
          maxMaxPlayers: filters.maxMaxPlayers,
          minPerTeam: filters.minPerTeam,
          maxPerTeam: filters.maxPerTeam,
          tri: Array.from(state.tri.entries()),
        };
      }

      function normalizeProfileFilters(filters) {
        const value = filters || {};
        return {
          worker: value.worker || "w0",
          type: value.type || "all",
          hideEmpty: value.hideEmpty === true,
          teamFilters: Array.isArray(value.teamFilters) ? value.teamFilters.filter((item) => item && item !== "any") : [],
          sort: value.sort || "starts_asc",
          minJoined: value.minJoined ?? null,
          maxJoined: value.maxJoined ?? null,
          maxPlayersEq: value.maxPlayersEq ?? null,
          minMaxPlayers: value.minMaxPlayers ?? null,
          maxMaxPlayers: value.maxMaxPlayers ?? null,
          minPerTeam: value.minPerTeam ?? null,
          maxPerTeam: value.maxPerTeam ?? null,
          tri: Array.isArray(value.tri) ? value.tri : [],
        };
      }

      function getActiveProfileDefinitions() {
        if (state.activeProfiles.size === 0) return [];
        const active = state.activeProfiles;
        return getStoredProfiles()
          .filter((profile) => profile?.name && active.has(profile.name))
          .map((profile) => ({ ...profile, filters: normalizeProfileFilters(profile.filters) }));
      }

      function setInputNum(element, value) {
        element.value = value === null || value === undefined ? "" : String(value);
      }

      function dispatchChange(element) {
        element.dispatchEvent(new Event("change", { bubbles: true }));
      }

      function applyProfileSnapshot(rawFilters) {
        if (!rawFilters) return;
        const filters = normalizeProfileFilters(rawFilters);
        const nextWorker = filters.worker;
        const workerChanged = els.worker.value !== nextWorker;

        state.applyingProfile = true;
        try {
          els.worker.value = nextWorker;
          els.type.value = filters.type;
          els.hideEmpty.value = filters.hideEmpty ? "yes" : "no";
          els.sort.value = filters.sort;

          state.teamFilters = new Set(filters.teamFilters.length ? filters.teamFilters : ["any"]);
          els.teamsFilter.value = filters.teamFilters[0] || "any";

          setInputNum(els.minJoined, filters.minJoined);
          setInputNum(els.maxJoined, filters.maxJoined);
          setInputNum(els.maxPlayersEq, filters.maxPlayersEq);
          setInputNum(els.minMaxPlayers, filters.minMaxPlayers);
          setInputNum(els.maxMaxPlayers, filters.maxMaxPlayers);
          setInputNum(els.minPerTeam, filters.minPerTeam);
          setInputNum(els.maxPerTeam, filters.maxPerTeam);

          initTriState();
          for (const [id, value] of filters.tri) {
            if ([TRI.ANY, TRI.YES, TRI.NO].includes(value)) state.tri.set(id, value);
          }
          renderModFiltersUI();

          [
            els.type,
            els.teamsFilter,
            els.hideEmpty,
            els.sort,
            els.minJoined,
            els.maxJoined,
            els.maxPlayersEq,
            els.minMaxPlayers,
            els.maxMaxPlayers,
            els.minPerTeam,
            els.maxPerTeam,
          ].forEach(dispatchChange);

          if (workerChanged) dispatchChange(els.worker);
        } finally {
          state.applyingProfile = false;
        }

        resetAlertBaseline();
        scheduleRender();
      }

      function saveCurrentProfile() {
        const name = els.profileName.value.trim();
        if (!name) {
          alert("Name the profile first.");
          return;
        }

        const profiles = getStoredProfiles().filter((profile) => profile?.name !== name);
        profiles.push({
          name,
          filters: getProfileSnapshot(),
          updatedAt: Date.now(),
        });

        saveStoredProfiles(profiles);
        state.activeProfiles = new Set([name]);
        state.profileSelectionOrder = [name];
        refreshProfileSelect([name]);
        resetAlertBaseline();
        scheduleRender();
      }

      function deleteSelectedProfile() {
        const typedName = els.profileName.value.trim();
        const names = typedName ? [typedName] : Array.from(state.activeProfiles);
        if (names.length === 0) {
          alert("Select a saved profile first.");
          return;
        }

        const remove = new Set(names);
        const profiles = getStoredProfiles();
        const next = profiles.filter((profile) => !remove.has(profile?.name));
        if (next.length === profiles.length) {
          alert("That profile does not exist.");
          return;
        }

        saveStoredProfiles(next);
        for (const name of remove) state.activeProfiles.delete(name);
        state.profileSelectionOrder = state.profileSelectionOrder.filter((name) => !remove.has(name));
        els.profileName.value = "";
        refreshProfileSelect();
        resetAlertBaseline();
        scheduleRender();
      }

      const boolFilters = [
        { id: "isCompact", label: "Compact Map", get: (g) => getPmTrue(g, "isCompact") },
        { id: "isCrowded", label: "Crowded", get: (g) => getPmTrue(g, "isCrowded") },
        { id: "randomSpawn", label: "Random Spawn", get: (g) => getAnyTrue(g, [["pm", "isRandomSpawn"], ["cfg", "randomSpawn"]]) },
        { id: "isAlliancesDisabled", label: "Alliances Disabled", get: (g) => getPmTrue(g, "isAlliancesDisabled") },
        { id: "isNukesDisabled", label: "Nukes Disabled", get: (g) => getPmTrue(g, "isNukesDisabled") },
        { id: "isPortsDisabled", label: "Ports Disabled", get: (g) => getPmTrue(g, "isPortsDisabled") },
        { id: "isSAMsDisabled", label: "SAMs Disabled", get: (g) => getPmTrue(g, "isSAMsDisabled") },
        { id: "waterNukes", label: "Water Nukes", get: (g) => getAnyTrue(g, [["pm", "isWaterNukes"], ["cfg", "waterNukes"]]) },
        { id: "isPeaceTime", label: "Peace Time", get: (g) => getPmTrue(g, "isPeaceTime") },
        { id: "isHardNations", label: "Hard Nations", get: (g) => getPmTrue(g, "isHardNations") },
      ];
      
      const numExact = [
        { id: "goldMultiplier_eq_2", label: "2× Gold", key: "goldMultiplier", exact: 2 },
        { id: "startingGold_eq_1000000", label: "1M Starting Gold", key: "startingGold", exact: 1000000 },
        { id: "startingGold_eq_5000000", label: "5M Starting Gold", key: "startingGold", exact: 5000000 },
        { id: "startingGold_eq_25000000", label: "25M Starting Gold", key: "startingGold", exact: 25000000 },
      ];
      
      function parseNum(v) {
        if (v === "" || v === null || v === undefined) return null;
        const n = Number(v);
        return Number.isFinite(n) ? n : null;
      }
      
      function getJoinUrl(gameID) {
        if (!gameID) return "about:blank";
        return `https://openfront.io/game/${encodeURIComponent(gameID)}`;
      }
      
      function wireActionLinks() {
        // The whole card is the join button.
        const openCard = (e) => {
          const card = e.target.closest(".gameCard[data-join-url]");
          if (!card) return;
          window.open(card.dataset.joinUrl, "_blank", "noopener,noreferrer");
        };

        els.cardGrid.addEventListener("click", openCard);
        els.cardGrid.addEventListener("keydown", (e) => {

          if (!e.target.closest(".gameCard[data-join-url]")) return;

          openCard(e);
        });

        const canHover = !window.matchMedia || window.matchMedia("(hover: hover)").matches;
        if (canHover) {
          els.cardGrid.addEventListener("pointerenter", () => {
            state.cardsHoverHold = true;
          });
          els.cardGrid.addEventListener("pointerleave", () => {
            state.cardsHoverHold = false;
            flushPendingCards();
          });
        }
      }
      
      function getCfg(g) { return g?.cfg || g?.gameConfig || null; }
      function getPm(g) { return g?.pm || g?.gameConfig?.publicGameModifiers || null; }
      
      function getPmTrue(g, key) {
        const pm = getPm(g);
        if (!pm || !(key in pm)) return null;
        return pm[key] === true;
      }
      
      function getAnyTrue(g, sources) {
        const pm = getPm(g);
        const cfg = getCfg(g);
        for (const [where, key] of sources) {
          const obj = where === "pm" ? pm : cfg;
          if (!obj || !(key in obj)) continue;
          if (obj[key] === true) return true;
        }
        return null;
      }
      
      function getNumber(g, key) {
        const pm = getPm(g);
        if (pm && typeof pm[key] === "number") return pm[key];
        const cfg = getCfg(g);
        if (cfg && typeof cfg[key] === "number") return cfg[key];
        return null;
      }
      
      function initTriState() {
        state.tri.clear();
        for (const f of boolFilters) state.tri.set(f.id, TRI.ANY);
        for (const n of numExact) state.tri.set(n.id, TRI.ANY);
      }
      
      function setTri(id, value) {
        leaveProfileModeOnManualChange();
        state.tri.set(id, value);
        document.querySelectorAll(`[data-tri="${CSS.escape(id)}"]`).forEach((btn) => {
          btn.classList.toggle("active", btn.getAttribute("data-val") === value);
        });
        resetAlertBaseline();
        scheduleRender();
      }
      
      function triButtonGroup(id) {
        const cur = state.tri.get(id) || TRI.ANY;
        const mkBtn = (val, text) =>
          `<button type="button" class="triBtn ${cur === val ? "active" : ""}" data-tri="${escapeHtml(id)}" data-val="${escapeHtml(val)}">${escapeHtml(text)}</button>`;

        return `<div class="triBtns">
          ${mkBtn(TRI.ANY, "Any")}
          ${mkBtn(TRI.YES, "Yes")}
          ${mkBtn(TRI.NO, "No")}
        </div>`;
      }

      // Yes = the lobby must have the modifier (all "Yes" modifiers required).
      // No  = exclude any lobby that has the modifier. Any = ignore.
      function matchModifierFilters(g, triState = state.tri) {
        const entries = [
          ...boolFilters.map((bf) => [bf.id, bf.get(g.raw) === true]),
          ...numExact.map((nf) => [nf.id, getNumber(g.raw, nf.key) === nf.exact]),
        ];

        let hasYes = false;
        let allYesMatched = true;

        for (const [id, matched] of entries) {
          const tri = triState.get(id) || TRI.ANY;
          if (tri === TRI.NO && matched) return false;
          if (tri === TRI.YES) {
            hasYes = true;
            if (!matched) allYesMatched = false;
          }
        }

        return hasYes ? allYesMatched : true;
      }
      function renderModFiltersUI() {
        const first = new Set(["isCompact", "isCrowded", "randomSpawn"]);
        const blocks = [];
      
        for (const f of boolFilters.filter((x) => first.has(x.id))) {
          blocks.push(`<div class="modBox"><div class="modTitle mono">${escapeHtml(f.label)}</div>${triButtonGroup(f.id)}</div>`);
        }
        for (const n of numExact) {
          blocks.push(`<div class="modBox"><div class="modTitle mono">${escapeHtml(n.label)}</div>${triButtonGroup(n.id)}</div>`);
        }
        for (const f of boolFilters.filter((x) => !first.has(x.id))) {
          blocks.push(`<div class="modBox"><div class="modTitle mono">${escapeHtml(f.label)}</div>${triButtonGroup(f.id)}</div>`);
        }
      
        els.modFilters.innerHTML = blocks.join("");
        els.modFilters.querySelectorAll("button[data-tri][data-val]").forEach((btn) => {
          btn.addEventListener("click", () => setTri(btn.getAttribute("data-tri"), btn.getAttribute("data-val")));
        });
      }
      
      function normalizeGame(g) {
        const cfg = g?.gameConfig || {};
        const pm = cfg.publicGameModifiers || {};
        const joined = Number(g?.numClients ?? 0);
        const maxPlayers = typeof cfg.maxPlayers === "number" ? cfg.maxPlayers : null;
      
        const teamValue = cfg.playerTeams ?? null;
        const teamCount = typeof teamValue === "number" ? teamValue : null;
        const compactTeam = String(teamValue ?? "").trim().replace(/\s+/g, "").toLowerCase();
      
        let format = null;
        if (compactTeam === "duos") format = "Duos";
        else if (compactTeam === "trios") format = "Trios";
        else if (compactTeam === "quads") format = "Quads";
        else if (compactTeam === "humansvsnations") format = "HumansVsNations";
      
        const kind = teamCount && teamCount > 1 ? "team" : (format ? "team" : (g.__rawType === "team" ? "team" : "ffa"));
      
        return {
          raw: g,
          cfg,
          pm,
          id: String(g?.gameID ?? ""),
          map: String(cfg.gameMap ?? "—"),
          joined,
          maxPlayers,
          kind,
          teamCount,
          playersPerTeam:
            format === "Duos" ? 2 :
            format === "Trios" ? 3 :
            format === "Quads" ? 4 :
            (typeof teamCount === "number" && maxPlayers !== null && teamCount > 0 ? maxPlayers / teamCount : null),
          format,
          startsAt: g?.startsAt ?? null,
        };
      }
      
      function getLobbyKind(g) {
        return g?.kind || "ffa";
      }

      // The "Type" filter treats Humans vs Nations as its own type, separate
      // from plain Teams (matches the FFA / Teams / Humans vs Nations choices).
      function getLobbyType(g) {
        return g?.format === "HumansVsNations" ? "humansVsNations" : getLobbyKind(g);
      }

      function flattenGames(payload) {
        const out = [];
        const gamesByType = payload?.games || {};
        for (const [rawType, arr] of Object.entries(gamesByType)) {
          if (!Array.isArray(arr)) continue;
          for (const g of arr) out.push(normalizeGame({ ...g, __rawType: rawType }));
        }
        return out;
      }
      
      function getFiltersFromUI() {
        return {
          type: els.type.value,
          hideEmpty: els.hideEmpty.value === "yes",
          teamFilters: Array.from(state.teamFilters || []).filter((v) => v !== "any"),
          sort: els.sort.value,
          minJoined: parseNum(els.minJoined.value),
          maxJoined: parseNum(els.maxJoined.value),
          maxPlayersEq: parseNum(els.maxPlayersEq.value),
          minMaxPlayers: parseNum(els.minMaxPlayers.value),
          maxMaxPlayers: parseNum(els.maxMaxPlayers.value),
          minPerTeam: parseNum(els.minPerTeam.value),
          maxPerTeam: parseNum(els.maxPerTeam.value),
        };
      }
      
      function getAlertFilterKey(f) {
        const triState = Array.from(state.tri.entries()).sort(([a], [b]) => a.localeCompare(b));
        const activeProfiles = getActiveProfileDefinitions()
          .map((profile) => ({ name: profile.name, updatedAt: profile.updatedAt || 0 }))
          .sort((a, b) => a.name.localeCompare(b.name));

        return JSON.stringify({
          activeProfiles,
          type: f.type,
          hideEmpty: f.hideEmpty,
          teamFilters: f.teamFilters,
          minJoined: f.minJoined,
          maxJoined: f.maxJoined,
          maxPlayersEq: f.maxPlayersEq,
          minMaxPlayers: f.minMaxPlayers,
          maxMaxPlayers: f.maxMaxPlayers,
          minPerTeam: f.minPerTeam,
          maxPerTeam: f.maxPerTeam,
          tri: triState,
        });
      }
      
      function updateAlertToggleUI() {
        if (!els.alertToggle) return;
        els.alertToggle.textContent = state.alertsEnabled ? "Alerts: On" : "Alerts: Off";
        els.alertToggle.classList.toggle("on", state.alertsEnabled);
      }
      
      function currentMatchingIdsFromPayload() {
        if (!state.payload) return new Set();
        const f = getFiltersFromUI();
        return new Set(flattenGames(state.payload).filter((g) => matchesCurrentFilters(g, f)).map((g) => String(g.id || "")));
      }
      
      function resetAlertBaseline() {
        if (!state.payload) {
          state.alertPrevIds = new Set();
          state.alertBaselineReady = false;
          state.alertLastFilterKey = "";
          return;
        }
      
        const f = getFiltersFromUI();
        state.alertPrevIds = currentMatchingIdsFromPayload();
        state.alertBaselineReady = true;
        state.alertLastFilterKey = getAlertFilterKey(f);
      }
      
      async function setAlertsEnabled(enabled) {
        state.alertsEnabled = enabled;
        localStorage.setItem("openfrontAlertsEnabled", String(enabled));
        updateAlertToggleUI();
      
        if (enabled) {
          resetAlertBaseline();
      
          try {
            state.audioCtx = state.audioCtx || new (window.AudioContext || window.webkitAudioContext)();
            if (state.audioCtx.state === "suspended") await state.audioCtx.resume();
          } catch {}
      
          if ("Notification" in window && Notification.permission === "default") {
            try { await Notification.requestPermission(); } catch {}
          }
        } else {
          stopTitleBlink();
          state.flashIds.clear();
          scheduleRender();
        }
      }
      
      function playAlertSound() {
        if (!state.alertsEnabled) return;
      
        try {
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtx) return;
      
          const ctx = state.audioCtx || new AudioCtx();
          state.audioCtx = ctx;
          if (ctx.state === "suspended") ctx.resume().catch(() => {});
      
          const now = ctx.currentTime;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
      
          osc.type = "sine";
          osc.frequency.setValueAtTime(880, now);
          osc.frequency.setValueAtTime(660, now + 0.13);
      
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(0.18, now + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
      
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now);
          osc.stop(now + 0.38);
        } catch {}
      }
      
      function stopTitleBlink() {
        if (state.titleBlinkTimer) clearInterval(state.titleBlinkTimer);
        if (state.titleBlinkStopTimer) clearTimeout(state.titleBlinkStopTimer);
        state.titleBlinkTimer = null;
        state.titleBlinkStopTimer = null;
        document.title = state.originalTitle;
      }
      
      function startTitleBlink(count) {
        stopTitleBlink();
      
        let visible = false;
        state.titleBlinkTimer = setInterval(() => {
          visible = !visible;
          document.title = visible ? `(${count}) New OpenFront match!` : state.originalTitle;
        }, 800);
      
        state.titleBlinkStopTimer = setTimeout(stopTitleBlink, 10000);
      }
      
      function showDesktopNotification(newGames) {
        if (!state.alertsEnabled) return;
        if (!("Notification" in window)) return;
        if (Notification.permission !== "granted") return;
      
        const first = newGames[0];
        const cfg = getCfg(first) || {};
        const maxPlayers = typeof cfg.maxPlayers === "number" ? `/${cfg.maxPlayers}` : "";
        const body = newGames.length === 1
          ? `${cfg.gameMap ?? "Unknown map"} • ${first.joined ?? 0}${maxPlayers} players • ${typeLabelShort(first)}`
          : `${newGames.length} new lobbies match your filters`;
      
        try {
          const n = new Notification("OpenFront lobby match", {
            body,
            tag: "openfront-lobby-match",
            renotify: true,
          });
      
          n.onclick = () => {
            window.focus();
            if (first?.id) window.open(getJoinUrl(first.id), "_blank", "noreferrer");
            n.close();
          };
        } catch {}
      }
      
      function markNewMatches(newGames) {
        const until = Date.now() + 9000;
        for (const g of newGames) {
          if (g.id) state.flashIds.set(String(g.id), until);
        }
      
        if (els.alertToggle) {
          els.alertToggle.classList.remove("flash");
          void els.alertToggle.offsetWidth;
          els.alertToggle.classList.add("flash");
          setTimeout(() => els.alertToggle.classList.remove("flash"), 4500);
        }
      }
      
      function cleanupFlashIds() {
        const now = Date.now();
        for (const [id, until] of state.flashIds.entries()) {
          if (until <= now) state.flashIds.delete(id);
        }
      }
      
      const FLIP_MS = 260;
      const prefersReducedMotion = () =>
        !!(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches);

      function nodeFromHtml(html) {
        const t = document.createElement("template");
        t.innerHTML = html.trim();
        return t.content.firstElementChild;
      }

      // Build the three empty column shells once. Cards are filled in (and reused)
      // by reconcileColumn — we never blow away the whole grid, so images that are
      // already decoded stay put instead of flashing back to their placeholder.
      function ensureColumns() {
        if (els.cardGrid.querySelector(".cardColumn")) return;
        els.cardGrid.innerHTML = CARD_COLUMNS.map((col) => `
          <section class="cardColumn" data-cat="${col.key}">
            <div class="colHeader">${escapeHtml(col.label)}<span class="colCount mono" data-col-count="${col.key}">0</span></div>
            <div class="colCards" data-col-cards="${col.key}"></div>
          </section>
        `).join("");
      }

      // Reconcile one column's cards against the desired game list, keyed by id:
      // reuse the node for a game that's still here, create one for a new game,
      // drop the node for a game that left, then put everything in sorted order.
      function reconcileColumn(col, games, serverTime) {
        const host = els.cardGrid.querySelector(`.colCards[data-col-cards="${col.key}"]`);
        if (!host) return;

        const countEl = els.cardGrid.querySelector(`[data-col-count="${col.key}"]`);
        if (countEl) countEl.textContent = String(games.length);

        const existing = new Map();
        host.querySelectorAll(":scope > .gameCard[data-game-id]").forEach((n) => existing.set(n.dataset.gameId, n));

        const order = [];
        const keep = new Set();
        for (const g of games) {
          const id = String(g.id || "");
          let node = id ? existing.get(id) : null;
          if (node) {
            keep.add(id);
          } else {
            try {
              node = nodeFromHtml(cardHtml(g, serverTime));
            } catch (e) {
              node = nodeFromHtml(`<div class="cardEmpty mono" style="color:#ff8f8f">Error: ${escapeHtml(e.message)}</div>`);
            }
          }
          if (node) order.push(node);
        }
        for (let i = games.length; i < COLUMN_MIN_SLOTS; i++) order.push(nodeFromHtml(spawnPlaceholderHtml()));

        // Drop cards whose game is gone, plus any stale placeholders.
        existing.forEach((node, id) => { if (!keep.has(id)) node.remove(); });
        host.querySelectorAll(":scope > .colEmpty").forEach((n) => n.remove());

        // Place every node at its target index, moving survivors as needed.
        order.forEach((node, i) => {
          const current = host.children[i];
          if (current !== node) host.insertBefore(node, current || null);
        });
        while (host.children.length > order.length) host.lastElementChild.remove();
      }

      function captureCardRects() {
        const rects = new Map();
        els.cardGrid.querySelectorAll(".gameCard[data-game-id]").forEach((card) => {
          rects.set(card.dataset.gameId, card.getBoundingClientRect());
        });
        return rects;
      }

      function applyStructure(buckets, serverTime, sig) {
        // While the pointer is over the grid, don't restructure it: moving a card
        // out from under the cursor mid-hover is jarring. Stash the latest data and
        // apply it once the pointer leaves. lastStructSig stays untouched so the
        // deferred change still reads as pending on the next render.
        if (state.cardsHoverHold) {
          state.pendingStructure = { buckets, serverTime, sig };
          return;
        }
        state.pendingStructure = null;

        ensureColumns();

        // FIRST: where does every surviving card sit before we reorder?
        const prevRects = prefersReducedMotion() ? null : captureCardRects();

        for (const col of CARD_COLUMNS) reconcileColumn(col, buckets[col.key], serverTime);

        if (prevRects) flipCards(prevRects);
        state.lastStructSig = sig;
      }

      // Slide surviving cards from their old positions to their new ones — e.g. the
      // game at [0] ends and [1] shifts up into its place. Classic FLIP: reconcile
      // already moved the nodes, so Invert them back to the old spot, then Play.
      function flipCards(prevRects) {
        const moved = [];

        els.cardGrid.querySelectorAll(".gameCard[data-game-id]").forEach((card) => {
          const prev = prevRects.get(card.dataset.gameId);
          if (!prev) return;                                 // brand-new card — let it just appear
          const now = card.getBoundingClientRect();
          const dx = prev.left - now.left;
          const dy = prev.top - now.top;
          if (Math.abs(dx) < 1 && Math.abs(dy) < 1) return;  // didn't actually move

          card.style.transition = "none";
          card.style.transform = `translate(${dx}px, ${dy}px)`;
          moved.push(card);
        });

        if (!moved.length) return;

        // PLAY: next frame, drop the offset and let it ease into its real spot.
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            for (const card of moved) {
              card.style.transition = `transform ${FLIP_MS}ms cubic-bezier(0.22, 0.61, 0.36, 1)`;
              card.style.transform = "";
            }
          });
        });

        // Strip the inline styles once settled so hover transitions resume normally.
        for (const card of moved) {
          let done = false;
          const cleanup = (e) => {
            if (done || (e && e.propertyName && e.propertyName !== "transform")) return;
            done = true;
            card.style.transition = "";
            card.style.transform = "";
            card.removeEventListener("transitionend", cleanup);
          };
          card.addEventListener("transitionend", cleanup);
          setTimeout(cleanup, FLIP_MS + 120);
        }
      }

      function flushPendingCards() {
        if (!state.pendingStructure) return;
        const { buckets, serverTime, sig } = state.pendingStructure;
        state.pendingStructure = null;
        applyStructure(buckets, serverTime, sig);
      }
      
      function scheduleRender() {
        if (state.renderScheduled) return;
        state.renderScheduled = true;
        requestAnimationFrame(() => {
          state.renderScheduled = false;
          render();
        });
      }
      
      function handleNewMatchingGames(sortedGames, f) {
        const filterKey = getAlertFilterKey(f);
        const currentIds = new Set(sortedGames.map((g) => String(g.id || "")));
      
        if (!state.alertsEnabled) {
          state.alertPrevIds = currentIds;
          state.alertBaselineReady = true;
          state.alertLastFilterKey = filterKey;
          return;
        }
      
        if (!state.alertBaselineReady || state.alertLastFilterKey !== filterKey) {
          state.alertPrevIds = currentIds;
          state.alertBaselineReady = true;
          state.alertLastFilterKey = filterKey;
          return;
        }
      
        const newGames = sortedGames.filter((g) => {
          const id = String(g.id || "");
          return id && !state.alertPrevIds.has(id);
        });
      
        state.alertPrevIds = currentIds;
        state.alertLastFilterKey = filterKey;
      
        if (newGames.length === 0) return;
      
        markNewMatches(newGames);
        playAlertSound();
        startTitleBlink(newGames.length);
        showDesktopNotification(newGames);
      }
      
      function matchTeamsFilter(g, teamFilters) {
        if (!teamFilters || teamFilters.length === 0) return true;

        const teams = g.teamCount ?? g.raw?.gameConfig?.playerTeams ?? null;
        if (teams === null && !g.format) return false;

        for (const value of teamFilters) {
          if (value.startsWith("teams:")) {
            const n = Number(value.split(":")[1]);
            if (typeof teams === "number" && teams === n) return true;
          } else if (value.startsWith("format:")) {
            const want = value.split(":")[1];
            if (g.format === want) return true;
          }
        }

        return false;
      }

      function matchPlayerFilters(g, f) {
        const joined = g.joined ?? 0;
        const maxPlayers = g.maxPlayers;
      
        if (f.minJoined !== null && joined < f.minJoined) return false;
        if (f.maxJoined !== null && joined > f.maxJoined) return false;
      
        if (f.maxPlayersEq !== null) {
          if (maxPlayers === null) return false;
          if (maxPlayers !== f.maxPlayersEq) return false;
        }
      
        if (f.minMaxPlayers !== null) {
          if (maxPlayers === null) return false;
          if (maxPlayers < f.minMaxPlayers) return false;
        }
      
        if (f.maxMaxPlayers !== null) {
          if (maxPlayers === null) return false;
          if (maxPlayers > f.maxMaxPlayers) return false;
        }

        if (f.minPerTeam !== null || f.maxPerTeam !== null) {
          const perTeam = g.playersPerTeam;
          if (perTeam === null || perTeam === undefined) return false;
          if (f.minPerTeam !== null && perTeam < f.minPerTeam) return false;
          if (f.maxPerTeam !== null && perTeam > f.maxPerTeam) return false;
        }

        return true;
      }
      
      function matchAllFilters(g, f, triState = state.tri) {
        if (f.type !== "all" && getLobbyType(g) !== f.type) return false;
        if (f.hideEmpty && (g.joined ?? 0) === 0) return false;

        if (!matchTeamsFilter(g, f.teamFilters)) return false;
        if (!matchPlayerFilters(g, f)) return false;
        if (!matchModifierFilters(g, triState)) return false;

        return true;
      }

      function matchesCurrentFilters(g, manualFilters) {
        const profiles = getActiveProfileDefinitions();
        if (profiles.length === 0) return matchAllFilters(g, manualFilters, state.tri);

        return profiles.some((profile) => {
          const triState = new Map(profile.filters.tri);
          return matchAllFilters(g, profile.filters, triState);
        });
      }
      
      function sortGames(games, sort) {
        const getMax = (g) => (typeof g.maxPlayers === "number" ? g.maxPlayers : -1);
      
        const cmp =
          {
            players_desc: (a, b) => (b.joined ?? 0) - (a.joined ?? 0),
            players_asc: (a, b) => (a.joined ?? 0) - (b.joined ?? 0),
            maxPlayers_desc: (a, b) => getMax(b) - getMax(a),
            maxPlayers_asc: (a, b) => getMax(a) - getMax(b),
            starts_asc: (a, b) => (a.startsAt ?? Infinity) - (b.startsAt ?? Infinity),
            map_asc: (a, b) => String(a.map ?? "").localeCompare(String(b.map ?? "")),
          }[sort] || ((a, b) => (b.joined ?? 0) - (a.joined ?? 0));
      
        return games.slice().sort(cmp);
      }
      
      function formatDuration(s) {
        const m = Math.floor(s / 60);
        const r = s % 60;
        if (m <= 0) return `${r}s`;
        if (m < 60) return `${m}m ${r}s`;
        const h = Math.floor(m / 60);
        const mm = m % 60;
        return `${h}h ${mm}m`;
      }
      
      function formatTeamCountLabel(teamCount, maxPlayers) {
        if (typeof teamCount !== "number" || !Number.isFinite(teamCount) || teamCount <= 1) return "Team";
      
        if (typeof maxPlayers === "number" && Number.isFinite(maxPlayers) && maxPlayers > 0) {
          const perTeam = maxPlayers / teamCount;
          const perTeamText = Number.isInteger(perTeam) ? String(perTeam) : perTeam.toFixed(1).replace(/\.0$/, "");
          return `${teamCount} Teams of ${perTeamText} Players`;
        }
      
        return `${teamCount} Teams`;
      }
      
      function typeLabelShort(g) {
        if (g.kind === "ffa") return "Free For All";
        if (g.format === "Duos") return "Duos";
        if (g.format === "Trios") return "Trios";
        if (g.format === "Quads") return "Quads";
        if (g.format === "HumansVsNations") return "Humans Vs Nations";
      
        if (typeof g.teamCount === "number" && Number.isFinite(g.teamCount)) {
          return formatTeamCountLabel(g.teamCount, g.maxPlayers);
        }
      
        return "Team";
      }
      
      function modeSummaryLine(g) {
        return typeLabelShort(g);
      }
      
      // All active modifiers for a game as pretty labels. Labels mirror OpenFront's
      // own getActiveModifiers() (src/client/Utils.ts) so they match the in-game
      // lobby badges. Each flag is read from publicGameModifiers, with a fallback to
      // the raw gameConfig (map size, disabledUnits, top-level waterNukes) so a tag
      // still shows however the lobby encodes it. Team format is omitted (the mode
      // line already conveys it).
      function gameModifierLabels(g) {
        const pm = g.pm || {};
        const cfg = g.cfg || {};
        const disabled = Array.isArray(cfg.disabledUnits) ? cfg.disabledUnits : [];
        const labels = [];

        const startingGold = getNumber(g.raw, "startingGold");
        if (Number.isFinite(startingGold) && startingGold > 0) labels.push(`${compactNumber(startingGold)} Starting Gold`);

        const goldMultiplier = getNumber(g.raw, "goldMultiplier");
        if (Number.isFinite(goldMultiplier) && goldMultiplier !== 1) labels.push(`${goldMultiplier}× Gold`);

        if (pm.isRandomSpawn === true || cfg.randomSpawn === true) labels.push("Random Spawn");
        if (pm.isCompact === true || cfg.gameMapSize === "Compact") labels.push("Compact Map");
        if (pm.isCrowded === true) labels.push("Crowded");
        if (pm.isHardNations === true) labels.push("Hard Nations");
        if (pm.isAlliancesDisabled === true || cfg.disableAlliances === true) labels.push("Alliances Disabled");
        if (pm.isPortsDisabled === true || disabled.includes("Port")) labels.push("Ports Disabled");
        if (pm.isNukesDisabled === true || disabled.includes("Atom Bomb")) labels.push("Nukes Disabled");
        if (pm.isSAMsDisabled === true) labels.push("SAMs Disabled");
        if (pm.isPeaceTime === true) labels.push("4min Peace");
        if (pm.isWaterNukes === true || cfg.waterNukes === true) labels.push("Water Nukes");

        return labels;
      }

      function compactNumber(value) {
        if (!Number.isFinite(value)) return null;
        if (Math.abs(value) >= 1000000) {
          const n = value / 1000000;
          return `${Number.isInteger(n) ? n : n.toFixed(1).replace(/\.0$/, "")}M`;
        }
        if (Math.abs(value) >= 1000) {
          const n = value / 1000;
          return `${Number.isInteger(n) ? n : n.toFixed(1).replace(/\.0$/, "")}K`;
        }
        return String(value);
      }

      // Measure a badge label's rendered width (uppercase, as drawn) so the stack
      // sorts by real pixel width, not character count — a "×" is far narrower than
      // a letter, so length-based sorting got the order wrong.
      let _badgeCtx = null;
      function badgeTextWidth(text) {
        if (!_badgeCtx) {
          _badgeCtx = document.createElement("canvas").getContext("2d");
          const font = getComputedStyle(document.documentElement).getPropertyValue("--font-sans").trim();
          _badgeCtx.font = "900 11px " + (font || "sans-serif");
        }
        return _badgeCtx.measureText(text.toUpperCase()).width;
      }

      // All modifier tags, widest label first, stacked vertically over the image.
      function cardBadgeLabels(g) {
        return gameModifierLabels(g).sort((a, b) => badgeTextWidth(b) - badgeTextWidth(a));
      }

      function formatCardStarts(g, serverTime) {
        if (!g.startsAt) return "Open";
        if (!serverTime) return "—";
        const deltaS = Math.round((g.startsAt - serverTime) / 1000);
        return deltaS > 0 ? formatDuration(deltaS) : "Started";
      }

      function cardHtml(g, serverTime) {
        const gameID = g.id || "";
        const joinUrl = getJoinUrl(gameID);
        const map = String(g.map ?? "—");
        const thumbUrl = getMapThumbnailUrl(map);
        const maxPlayers = g.maxPlayers;
        const isNewMatchFlash = state.flashIds.has(String(gameID));
        const badges = cardBadgeLabels(g)
          .map((label) => `<span class="cardBadge">${escapeHtml(label)}</span>`)
          .join("");

        return `
          <article
            class="gameCard ${isNewMatchFlash ? "newMatchFlash" : ""}"
            tabindex="0"
            role="link"
            data-game-id="${escapeHtml(gameID)}"
            data-join-url="${escapeHtml(joinUrl)}"
          >
            <div class="gameCardImage">
              <img
                src="${thumbUrl}"
                alt="${escapeHtml(map)} map"
                loading="lazy"
                decoding="async"
                onerror="this.onerror=null;this.style.opacity='0';"
              >
              <div class="cardBadges">${badges}</div>
              <div class="cardTime">${escapeHtml(formatCardStarts(g, serverTime))}</div>
              <div class="cardPlayers">${escapeHtml(String(g.joined ?? 0))}${maxPlayers !== null ? "/" + escapeHtml(String(maxPlayers)) : ""} 👥</div>
            </div>
            <div class="gameCardInfo">
              <div class="gameCardTop">
                <div class="gameCardText">
                  <div class="gameCardTitle">${escapeHtml(map)}</div>
                  <div class="gameCardMode">${escapeHtml(modeSummaryLine(g))}</div>
                </div>
                <div class="cardCode mono">${escapeHtml(gameID)}</div>
              </div>
            </div>
          </article>
        `;
      }

      const CARD_COLUMNS = [
        { key: "ffa", label: "Free For All" },
        { key: "team", label: "Teams" },
        { key: "special", label: "Special" },
      ];

      // Minimum slots shown per column (active game + the next one). Real games
      // fill these; any remaining slot shows a "Spawning game…" placeholder.
      const COLUMN_MIN_SLOTS = 2;

      function spawnPlaceholderHtml() {
        return `<div class="colEmpty"><span class="spawnDot"></span>Spawning game…</div>`;
      }

      // Identifies the *structure*: which game IDs are in which column, plus the
      // chosen sort. Player counts / countdowns changing does NOT change this, so
      // a number-only tick patches in place; adding/removing a game rebuilds.
      function structSignature(buckets, sort) {
        const ids = (arr) => arr.map((g) => String(g.id || "")).sort().join(",");
        return [sort, ids(buckets.ffa), ids(buckets.team), ids(buckets.special)].join("|");
      }

      // Patch only the volatile bits (countdown + player count) on cards already
      // in the DOM. No rebuild → the hovered card survives (no flash) and nothing
      // reorders. Runs every tick, even while a structural redraw is held.
      function updateLiveFields(games, serverTime) {
        const byId = new Map();
        for (const g of games) byId.set(String(g.id || ""), g);

        els.cardGrid.querySelectorAll(".gameCard[data-game-id]").forEach((card) => {
          const g = byId.get(card.dataset.gameId);
          if (!g) return;

          const timeEl = card.querySelector(".cardTime");
          if (timeEl) timeEl.textContent = formatCardStarts(g, serverTime);

          const playersEl = card.querySelector(".cardPlayers");
          if (playersEl) {
            const max = g.maxPlayers;
            playersEl.textContent = `${g.joined ?? 0}${max !== null ? "/" + max : ""} 👥`;
          }
        });
      }

      function render() {
        if (!state.payload) return;

        cleanupFlashIds();

        const serverTime = state.payload.serverTime;
        const games = flattenGames(state.payload);

        els.serverTime.textContent = serverTime ? new Date(serverTime).toLocaleTimeString() : "—";

        const f = getFiltersFromUI();
        const filtered = games.filter((g) => matchesCurrentFilters(g, f));
        const sorted = sortGames(filtered, f.sort);

        handleNewMatchingGames(sorted, f);

        // The socket already groups lobbies into ffa / team / special — keep each
        // game in the column the server assigned it to.
        const buckets = { ffa: [], team: [], special: [] };
        for (const g of sorted) {
          const cat = g.raw?.__rawType || g.raw?.publicGameType;
          if (buckets[cat]) buckets[cat].push(g);
        }

        // Structure = which game ids live in which column. Only that changing
        // touches the card nodes (add / remove / reorder); player counts and
        // countdowns just patch in place below.
        const sig = structSignature(buckets, f.sort);
        const alreadyBuilt = !!els.cardGrid.querySelector(".cardColumn");

        if (sig !== state.lastStructSig || !alreadyBuilt) {
          applyStructure(buckets, serverTime, sig);
        } else {
          // Shown structure already matches — drop any defer that's now obsolete.
          state.pendingStructure = null;
        }

        updateLiveFields(sorted, serverTime);
      }
      
      function setStatus(text, stateClass) {
        els.status.textContent = text;
        els.status.classList.remove("is-live", "is-connecting", "is-offline");
        if (stateClass) els.status.classList.add(stateClass);
      }

      function clearReconnectTimers() {
        if (state.reconnectTimer) clearTimeout(state.reconnectTimer);
        if (state.staleTimer) clearInterval(state.staleTimer);
        state.reconnectTimer = null;
        state.staleTimer = null;
      }
      
      function scheduleReconnect() {
        if (state.manualDisconnect) return;
        if (state.reconnectTimer) return;
      
        const attempts = Math.min(state.reconnectAttempts, 8);
        const delay = Math.min(30000, 1500 * Math.pow(1.8, attempts));
      
        state.reconnectAttempts += 1;
        setStatus(`Reconnecting in ${Math.round(delay / 1000)}s…`, "is-connecting");
      
        state.reconnectTimer = setTimeout(() => {
          state.reconnectTimer = null;
          connect();
        }, delay);
      }
      
      function startStaleWatch() {
        if (state.staleTimer) clearInterval(state.staleTimer);
      
        state.staleTimer = setInterval(() => {
          if (!state.ws || state.ws.readyState !== WebSocket.OPEN) return;
      
          const age = Date.now() - (state.lastMessageAt || 0);
          const staleAfter = 60000;
      
          if (state.lastMessageAt && age > staleAfter) {
            try { state.ws.close(); } catch {}
            scheduleReconnect();
          }
        }, 10000);
      }
      
      function cleanupWs() {
        clearReconnectTimers();
        if (!state.ws) return;
        try { state.ws.close(); } catch {}
        state.ws = null;
      }
      
      function connect() {
        clearReconnectTimers();
      
        const worker = els.worker.value || "w0";
        const url = `wss://openfront.io/${worker}/lobbies`;
        setStatus("Connecting…", "is-connecting");
      
        const ws = new WebSocket(url);
        state.ws = ws;
        state.manualDisconnect = false;
      
        ws.onopen = () => {
          state.reconnectAttempts = 0;
          state.lastMessageAt = Date.now();
          setStatus("Live", "is-live");
          startStaleWatch();
        };
      
        ws.onclose = () => {
          if (state.manualDisconnect) return;
          setStatus("Disconnected", "is-offline");
          scheduleReconnect();
        };

        ws.onerror = () => {
          if (state.manualDisconnect) return;
          setStatus("Connection error", "is-offline");
          scheduleReconnect();
        };
      
        ws.onmessage = (ev) => {
          try {
            state.lastMessageAt = Date.now();
            state.payload = JSON.parse(ev.data);
            scheduleRender();
          } catch {}
        };
      }
      
      function wireInputs() {
        const rerender = () => scheduleRender();
        const refilter = () => {
          leaveProfileModeOnManualChange();
          resetAlertBaseline();
          scheduleRender();
        };
      
        [
          els.type,
          els.teamsFilter,
          els.hideEmpty,
          els.minJoined,
          els.maxJoined,
          els.maxPlayersEq,
          els.minMaxPlayers,
          els.maxMaxPlayers,
          els.minPerTeam,
          els.maxPerTeam,
        ].forEach((el) => {
          el.addEventListener("input", refilter);
          el.addEventListener("change", refilter);
        });
      
        els.sort.addEventListener("input", rerender);
        els.sort.addEventListener("change", rerender);
      
        els.worker.addEventListener("change", () => {
          state.manualDisconnect = true;
          cleanupWs();
          state.alertBaselineReady = false;
          state.alertPrevIds = new Set();
      
          setTimeout(() => {
            state.manualDisconnect = false;
            connect();
          }, 100);
        });
      
        els.alertToggle.addEventListener("click", () => {
          setAlertsEnabled(!state.alertsEnabled);
        });

        els.toggleFilters.addEventListener("click", () => {
          const open = document.body.classList.toggle("filters-open");
          els.toggleFilters.textContent = open ? "Hide filters" : "Filters";

          // The panel is clipped (overflow:hidden) so it can slide open/closed
          // without spilling. But that clip would also cut off the filter dropdowns,
          // so lift it once the panel is fully expanded — and re-apply it the moment
          // we start collapsing.
          clearTimeout(state.filtersOpenTimer);
          if (!els.panelShell) return;
          if (open) {
            const reveal = () => els.panelShell.classList.add("filters-shown");
            if (prefersReducedMotion()) reveal();
            else state.filtersOpenTimer = setTimeout(reveal, 340);
          } else {
            els.panelShell.classList.remove("filters-shown");
          }
        });

        els.profileSave.addEventListener("click", saveCurrentProfile);
        els.profileDelete.addEventListener("click", deleteSelectedProfile);
      
        els.reset.addEventListener("click", () => {
          clearActiveProfiles();
          els.profileName.value = "";
          els.type.value = "all";
          els.teamsFilter.value = "any";
          state.teamFilters = new Set(["any"]);
          els.hideEmpty.value = "no";
          els.sort.value = "starts_asc";
      
          els.minJoined.value = "";
          els.maxJoined.value = "";
          els.maxPlayersEq.value = "";
          els.minMaxPlayers.value = "";
          els.maxMaxPlayers.value = "";
          els.minPerTeam.value = "";
          els.maxPerTeam.value = "";

          initTriState();
          renderModFiltersUI();
          resetAlertBaseline();
          scheduleRender();
      
          els.type.dispatchEvent(new Event("change", { bubbles: true }));
          els.teamsFilter.dispatchEvent(new Event("change", { bubbles: true }));
          els.hideEmpty.dispatchEvent(new Event("change", { bubbles: true }));
          els.sort.dispatchEvent(new Event("change", { bubbles: true }));
        });
      }
      
      initCustomSelects();
      initTriState();

      const savedActiveProfiles = getSavedActiveProfileNames();
      state.activeProfiles = new Set(savedActiveProfiles);
      state.profileSelectionOrder = savedActiveProfiles.slice();
      refreshProfileSelect();

      const lastSavedProfileName = state.profileSelectionOrder.at(-1);
      const lastSavedProfile = getStoredProfiles().find((profile) => profile?.name === lastSavedProfileName);
      if (lastSavedProfile) {
        els.profileName.value = lastSavedProfile.name;
        applyProfileSnapshot(lastSavedProfile.filters);
      } else {
        renderModFiltersUI();
      }

      wireInputs();
      wireActionLinks();
      updateAlertToggleUI();
      connect();
      </script>
  </body>
</html>
